<div id="form-builder-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 shadow-2xl">
        <h3 class="text-2xl font-bold mb-6">Design Your Form</h3>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="text-xs font-bold uppercase text-slate-400">Form Title</label>
                <input type="text" id="edit-form-name" class="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <p class="text-sm font-bold text-blue-800 mb-3">Add Input Element</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="addNewField('text')" class="bg-white p-2 rounded-lg text-xs border hover:border-blue-500">+ Text</button>
                    <button onclick="addNewField('textarea')" class="bg-white p-2 rounded-lg text-xs border hover:border-blue-500">+ Textarea</button>
                    <button onclick="addNewField('tel')" class="bg-white p-2 rounded-lg text-xs border hover:border-blue-500">+ Mobile</button>
                    <button onclick="addNewField('checkbox')" class="bg-white p-2 rounded-lg text-xs border hover:border-blue-500">+ Checkbox</button>
                </div>
            </div>
        </div>

        <div id="fields-preview-container" class="space-y-3 mb-8">
            </div>

        <div class="flex gap-4 border-t pt-6">
            <button onclick="closeBuilder()" class="flex-1 py-3 text-slate-500 font-bold">Cancel</button>
            <button onclick="saveFormToFirebase()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">Save Form Structure</button>
        </div>
    </div>
</div>

<script>
    let activeFields = [];
    let editingDocId = null;

    function addNewField(type) {
        const label = prompt("Enter Field Label (e.g., Full Name, Your Message):");
        if(!label) return;

        let fieldObj = { type, label, id: "field_" + Date.now() };
        
        if(type === 'textarea') {
            fieldObj.limit = prompt("Character limit?", "200");
        }
        
        activeFields.push(fieldObj);
        renderFieldsPreview();
    }

    function renderFieldsPreview() {
        const container = document.getElementById('fields-preview-container');
        container.innerHTML = activeFields.map((f, index) => `
            <div class="flex items-center justify-between p-4 bg-slate-50 border rounded-xl">
                <div>
                    <span class="text-xs font-bold text-blue-600 uppercase tracking-tighter">${f.type}</span>
                    <p class="font-semibold text-slate-800">${f.label} ${f.limit ? `(${f.limit} chars)` : ''}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="moveField(${index}, -1)" class="p-1 hover:bg-white rounded">↑</button>
                    <button onclick="moveField(${index}, 1)" class="p-1 hover:bg-white rounded">↓</button>
                    <button onclick="removeField(${index})" class="p-1 text-red-500 hover:bg-red-50 rounded">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function removeField(idx) {
        activeFields.splice(idx, 1);
        renderFieldsPreview();
    }

    function moveField(index, direction) {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < activeFields.length) {
            [activeFields[index], activeFields[newIndex]] = [activeFields[newIndex], activeFields[index]];
            renderFieldsPreview();
        }
    }

    async function saveFormToFirebase() {
        const name = document.getElementById('edit-form-name').value;
        const data = { name, fields: activeFields, visible: true, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };

        if(editingDocId) {
            await db.collection('forms').doc(editingDocId).update(data);
        } else {
            await db.collection('forms').add(data);
        }
        location.reload();
    }

    function createNewForm() {
        editingDocId = null;
        activeFields = [];
        document.getElementById('edit-form-name').value = "";
        renderFieldsPreview();
        document.getElementById('form-builder-modal').classList.remove('hidden');
    }

    function closeBuilder() { document.getElementById('form-builder-modal').classList.add('hidden'); }
</script>
