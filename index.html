</head>
<body class="bg-slate-50 text-slate-900">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden"></div>

    <nav id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 z-50">
        <div class="p-8 flex flex-col h-full">

                <h2 class="text-xl font-bold text-blue-400">VIPUL</h2>
                <button onclick="toggleSidebar()" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-6">
                <a href="index.html" class="block hover:text-blue-400 transition">🏠 User Home</a>
                <a href="admin.html" class="block hover:text-blue-400 transition">🔐 Admin Portal</a>
                <button onclick="showAbout()" class="block w-full text-left hover:text-blue-400 transition">ℹ️ About Us</button>
            </div>
        </div>
    </nav>

    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center">

    </header>

    <main id="app-content" class="container mx-auto px-4 py-10 min-h-screen">
        <h2 class="text-3xl font-bold mb-10 text-center">Available Portals</h2>
        <div id="forms-grid" class="grid md:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="bg-white border-t py-10 text-center text-slate-400 text-sm">
        <p>© 2026 Vipul Bishnoi. All Rights Reserved.</p>
    </footer>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div id="modal-box" class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 animate-in"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCXB_3ONshkBQznaLH2xsZZ9kN3meXcvc8",
            authDomain: "form-6cf5d.firebaseapp.com",
            projectId: "form-6cf5d",
            storageBucket: "form-6cf5d.firebasestorage.app",
            messagingSenderId: "557559151440",
            appId: "1:557559151440:web:25690655f29f2434f08a55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        async function loadUserForms() {
    const grid = document.getElementById('forms-grid');
    grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div><p>Connecting to Database...</p></div>';

    try {
        // Adding a 5-second timeout check
        const timeout = setTimeout(() => {
            if (grid.innerText.includes("Connecting")) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-red-500">Connection Timeout. Check your Internet or Firebase Rules.</p>';
            }
        }, 5000);

        const snap = await db.collection('forms').where('visible', '==', true).get();
        clearTimeout(timeout);

        grid.innerHTML = "";
        if (snap.empty) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 border-2 border-dashed rounded-3xl">No forms are currently enabled by Admin.</div>';
            return;
        }

        snap.forEach(doc => {
            const f = doc.data();
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-500 cursor-pointer transition-all transform hover:-translate-y-1";
            card.innerHTML = `
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">📄</div>
                <h3 class="text-xl font-bold text-slate-800">${f.name}</h3>
                <p class="text-slate-400 text-sm mt-1">Available for submission</p>
                <button class="mt-6 w-full py-2 bg-slate-50 text-blue-600 font-bold rounded-lg group-hover:bg-blue-600 group-hover:text-white transition">Fill Form</button>
            `;
            // Fixed Link logic
            card.onclick = () => {
                if(confirm(`Do you want to open "${f.name}"?`)) {
                    window.location.href = `fill.html?id=${doc.id}`;
                }
            };
            grid.appendChild(card);
        });
    } catch (e) {
        console.error("Firebase Error:", e);
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-500 bg-red-50 rounded-2xl border border-red-100">
            <strong>Database Error</strong><br>${e.message}
        </div>`;
    }
}


        function showAbout() {
            const modal = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            modal.classList.remove('hidden');
            box.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">About Developer</h2>
                <div class="space-y-3 mb-8">
                    <p><strong>Name:</strong> Vipul Bishnoi</p>
                    <p><strong>Contact:</strong> +91 94xxxxxx07</p>
                    <p><strong>Email:</strong> <a href="mailto:vipulbishnoi2992@gmail.com" class="text-blue-600 underline">vipulbishnoi2992@gmail.com</a></p>
                </div>
                <a href="https://resume-vipul.netlify.app/" target="_blank" class="block w-full py-4 bg-slate-900 text-white text-center rounded-xl font-bold">Visit Portfolio</a>
                <button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="w-full mt-4 text-slate-400 text-sm">Close</button>
            `;
            toggleSidebar();
        }

        loadUserForms();
    </script>
</body>
