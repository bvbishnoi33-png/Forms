<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPUL | Professional Form Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 z-50">
        <div class="p-8">
            <h2 class="text-xl font-bold border-b border-slate-700 pb-4 mb-6">VIPUL BISHNOI</h2>
            <div class="space-y-4">
                <button onclick="showPage('user-home')" class="block w-full text-left py-2 hover:text-blue-400">🏠 User Portal</button>
                <button onclick="showPage('admin-login')" class="block w-full text-left py-2 hover:text-blue-400">🔐 Admin Dashboard</button>
                <button onclick="showPage('about')" class="block w-full text-left py-2 hover:text-blue-400">ℹ️ About Us</button>
            </div>
        </div>
    </nav>

    <header class="sticky top-0 z-40 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-2xl">☰</button>
        <h1 class="text-lg font-black tracking-widest text-blue-600">VIPUL PRO-FORM</h1>
        <div id="auth-status" class="text-xs font-bold px-3 py-1 bg-slate-100 rounded-full">GUEST</div>
    </header>

    <main id="app-content" class="container mx-auto px-4 py-10 min-h-screen">
        </main>

    <footer class="bg-white border-t py-8 text-center text-slate-500 text-sm">
        <p>© 2026 Vipul Bishnoi. All Rights Reserved.</p>
    </footer>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div id="modal-box" class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 animate-in"></div>
    </div>

    <div id="response-view-modal" class="fixed inset-0 bg-white z-[70] hidden flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 id="response-title" class="text-2xl font-bold">Manage Submissions</h2>
            <button onclick="closeResponseModal()" class="text-3xl">&times;</button>
        </div>
        <div id="response-actions" class="flex gap-4 mb-4">
            <button onclick="deleteSelected()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-200">🗑️ Delete Selected</button>
            <button onclick="deleteAllResponses()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700">⚠️ Clear All</button>
            <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold ml-auto">📊 Export CSV</button>
        </div>
        <div class="overflow-auto border rounded-xl flex-1 bg-slate-50">
            <table id="response-table" class="w-full text-left border-collapse"></table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
